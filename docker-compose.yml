# ─────────────────────────────────────────────────────────────
# docker-compose.yml — Orquestração de containers
# DevOps Fase 2 — PUCRS
# ─────────────────────────────────────────────────────────────
version: '3.9'

services:

  # ── Aplicação principal ───────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: devops-fase2-app:latest
    container_name: devops-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_VERSION=${APP_VERSION:-1.0.0}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    volumes:
      - app-logs:/app/logs

  # ── Nginx: reverse proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: devops-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  app-logs:
