name: Pipeline CI/CD - Fase 2

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # ------------------------------------------
  # JOB 1: Validacao do Repositorio
  # ------------------------------------------
  validar-repositorio:
    name: Validar Estrutura do Repositorio
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Verificar arquivos essenciais
        run: |
          echo "=== Estrutura do repositorio ==="
          ls -la
          echo ""
          echo "=== Arquivos da aplicacao ==="
          find app/ -type f | sort
          echo ""
          echo "=== Arquivos Terraform ==="
          find terraform/ -type f | sort
          echo "Estrutura verificada com sucesso!"

      - name: Verificar sintaxe YAML
        run: |
          echo "=== Verificando arquivos YAML ==="
          find . -name "*.yml" -o -name "*.yaml" | grep -v ".git" | while read f; do
            python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" \
              && echo "OK: $f" \
              || (echo "ERRO: $f" && exit 1)
          done

  # ------------------------------------------
  # JOB 2: Validacao do Terraform
  # ------------------------------------------
  terraform-validate:
    name: Validar Infraestrutura Terraform
    runs-on: ubuntu-latest
    needs: validar-repositorio

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive ./terraform
        continue-on-error: true

      - name: Terraform init
        run: |
          cd terraform
          terraform init -backend=false
          echo "Init concluido com sucesso"

      - name: Terraform validate
        run: |
          cd terraform
          terraform validate
          echo "Validacao concluida com sucesso"

  # ------------------------------------------
  # JOB 3: Analise de Seguranca
  # ------------------------------------------
  seguranca:
    name: Analise de Seguranca tfsec
    runs-on: ubuntu-latest
    needs: terraform-validate

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Executar tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ./terraform
          soft_fail: true

      - name: Resumo da analise
        run: echo "Analise de seguranca concluida"

  # ------------------------------------------
  # JOB 4: Build e Teste da Imagem Docker
  # ------------------------------------------
  build-docker:
    name: Build e Teste da Imagem Docker
    runs-on: ubuntu-latest
    needs: seguranca

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem
        run: |
          docker build -t devops-fase2-app:${{ github.sha }} ./app
          echo "Imagem construida: devops-fase2-app:${{ github.sha }}"

      - name: Smoke test do container
        run: |
          docker run -d \
            --name test-app \
            -p 3000:3000 \
            devops-fase2-app:${{ github.sha }}
          sleep 8
          curl -f http://localhost:3000/health \
            && echo "Health check aprovado" \
            || (docker logs test-app && exit 1)
          docker stop test-app
          docker rm test-app

      - name: Inspecionar imagem
        run: |
          echo "=== Informacoes da imagem ==="
          docker inspect devops-fase2-app:${{ github.sha }} \
            --format="Tamanho: {{.Size}} bytes | OS: {{.Os}} | Arch: {{.Architecture}}"

  # ------------------------------------------
  # JOB 5: Deploy com Docker Compose
  # ------------------------------------------
  deploy-compose:
    name: Deploy com Docker Compose
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Subir ambiente com Docker Compose
        run: |
          docker compose up -d --build
          sleep 10

      - name: Verificar containers em execucao
        run: |
          docker compose ps
          echo ""
          echo "=== Testando endpoints ==="
          curl -f http://localhost:3000/health && echo "GET /health OK"
          curl -f http://localhost:3000/       && echo "GET / OK"
          curl -f http://localhost:3000/info   && echo "GET /info OK"

      - name: Exibir logs do ambiente
        if: always()
        run: docker compose logs --tail=20

      - name: Derrubar ambiente
        if: always()
        run: docker compose down -v

  # ------------------------------------------
  # JOB 6: Relatorio Final
  # ------------------------------------------
  relatorio-final:
    name: Relatorio Final do Pipeline
    runs-on: ubuntu-latest
    needs: [terraform-validate, seguranca, build-docker, deploy-compose]
    if: always()

    steps:
      - name: Gerar relatorio
        run: |
          echo "============================================"
          echo "   RELATORIO FINAL - FASE 2 DEVOPS"
          echo "============================================"
          echo ""
          echo "Repositorio: ${{ github.repository }}"
          echo "Branch:      ${{ github.ref_name }}"
          echo "Autor:       ${{ github.actor }}"
          echo "Data:        $(date '+%d/%m/%Y %H:%M')"
          echo "Commit:      ${{ github.sha }}"
          echo ""
          echo "Resultado dos jobs:"
          echo "  Validar Repositorio:  ${{ needs.validar-repositorio.result || 'skipped' }}"
          echo "  Terraform Validate:   ${{ needs.terraform-validate.result }}"
          echo "  Analise Seguranca:    ${{ needs.seguranca.result }}"
          echo "  Build Docker:         ${{ needs.build-docker.result }}"
          echo "  Deploy Compose:       ${{ needs.deploy-compose.result }}"
          echo ""
          echo "============================================"
          echo "Pipeline Fase 2 executado!"
          echo "============================================"
